<!DOCTYPE html>
<html><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Fix Avatar</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f0f0f;color:#fff;font-family:sans-serif;padding:12px}
h2{font-size:14px;color:#aaa;margin-bottom:12px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:16px}
.card{background:#1a1a1a;border-radius:8px;overflow:hidden;border:2px solid #333}
.card.changed{border-color:#4ade80}
.card img{width:100%;height:110px;object-fit:cover;object-position:top;display:block}
.card select{width:100%;background:#222;color:#fff;border:none;padding:6px;font-size:11px;border-top:1px solid #333;cursor:pointer}
.card select:focus{outline:none;background:#333}
.cur{font-size:9px;color:#888;padding:2px 6px 0;background:#1a1a1a}
button{background:#4ade80;color:#000;border:none;padding:10px 20px;border-radius:8px;font-size:14px;font-weight:bold;cursor:pointer;margin-bottom:10px}
button:hover{background:#22c55e}
textarea{width:100%;height:120px;background:#111;color:#4ade80;border:1px solid #333;border-radius:8px;padding:10px;font-size:12px;font-family:monospace;resize:none}
p.note{font-size:12px;color:#aaa;margin-bottom:8px}
</style>
</head>
<body>
<h2>Pilih nama yang BENAR untuk tiap avatar — Art (kecil) sebagai referensi</h2>
<div class="grid" id="grid"></div>
<button onclick="generate()">📋 Buat Perintah Rename</button>
<p class="note">Copy semua teks di bawah, paste ke chat:</p>
<textarea id="out" placeholder="Klik tombol di atas..."></textarea>

<script>
const chars = ["Abel","Bigbo","Bloody Vera","Cain","Celia","Chloe","Damyeon","Dewi","DnD","Elims","Harang","Haru","Hidden Rough","Jab","Jaka","Kai","LaLa","Luci","Maki","Miho","Mingming","Narcius","R","Rina","Rini","Roroa","Rough","Sid","Siho","Tiffany","Titi","Vera","Wukong","Xionell","YeonOh"];

const avatars = ["Abel","BigBo","Bloody Vera","Cain","Celia","Chloe","Damyeon","Dewi","DnD","Elims","Harang","Haru","Hidden Rough","Jab","Jaka","Kais","LaLa","Luci","Maki","Miho","Mingming","Narcius","R","Rina","Rini","Roroa","Rough","Sid","Siho","Tiffany","Titi","Vera","Wukong","Xionell","YeonOh"];

const grid = document.getElementById('grid');

avatars.forEach(av => {
  const card = document.createElement('div');
  card.className = 'card';
  card.id = 'card-' + av;

  const artName = encodeURIComponent(av + '.png');
  const avName = encodeURIComponent(av + '.png');

  const opts = chars.map(c => {
    const sel = c === av || (av==='BigBo'&&c==='Bigbo') || (av==='Kais'&&c==='Kai') ? 'selected' : '';
    return `<option value="${c}" ${sel}>${c}</option>`;
  }).join('');

  card.innerHTML = `
    <div style="display:flex">
      <div style="flex:1;position:relative">
        <img src="/Image/Karakter/Avatar/${avName}" title="Avatar: ${av}">
        <div style="position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.6);font-size:9px;padding:2px 4px;text-align:center">Avatar</div>
      </div>
      <div style="flex:1;position:relative">
        <img src="/Image/Karakter/Art/${artName}" title="Art: ${av}" onerror="this.src='/Image/Karakter/Art/${encodeURIComponent(chars.find(c=>c===av||'')||av)}.png'" style="opacity:0.5">
        <div style="position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.6);font-size:9px;padding:2px 4px;text-align:center;color:#aaa">Art (ref)</div>
      </div>
    </div>
    <div class="cur">Skrg: ${av}</div>
    <select onchange="document.getElementById('card-${av}').className='card changed'">${opts}</select>
  `;
  grid.appendChild(card);
});

function generate() {
  const lines = [];
  avatars.forEach(av => {
    const card = document.getElementById('card-' + av);
    const sel = card.querySelector('select');
    const newName = sel.value;
    if (newName !== av) {
      lines.push(`${av} → ${newName}`);
    }
  });
  if (lines.length === 0) {
    document.getElementById('out').value = 'Semua sudah benar, tidak ada yang perlu diubah.';
  } else {
    document.getElementById('out').value = lines.join('\n');
  }
}
</script>
</body></html>
